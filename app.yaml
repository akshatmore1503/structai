name: structai

services:
  - name: backend
    github:
      repo: akshatmore1503/structai
      branch: main
      dir: backend
    build_command: pip install -r requirements.txt
    run_command: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envs:
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "8000"
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs

  - name: frontend
    github:
      repo: akshatmore1503/structai
      branch: main
      dir: frontend
    build_command: npm ci && npm run build
    run_command: npm start
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: "https://${APP_DOMAIN}/api"
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "3000"
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs

databases:
  - name: structai-db
    engine: MONGODB
    version: "6"
