name: structai
services:
  - name: frontend
    github:
      repo: akshatmore1503/structai
      branch: main
      dir: frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs

  - name: backend
    github:
      repo: akshatmore1503/structai
      branch: main
      dir: backend
    run_command: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    instance_count: 1
    instance_size_slug: basic-xxs
